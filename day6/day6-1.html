<html>

<head>
    <title> selectors </title>
    <style>
        h2~p {
            color: green;
        }

        h2+p {
            color: blue;
        }
    </style>
</head>

<body>
    <h2>This is Heading</h2>
    <p>This is para1</p>
    <p>This is para2</p>
    <p>This is para3</p>
</body>

</html>
