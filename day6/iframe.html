<html>

<head>
    <title>BOX model</title>
    <style>
        .container {
            width: 400px;
            margin: auto;
            border: 1px solid black;
        }

        .header {
            background-color: pink;
            height: 80px;
            text-align: center;
            line-height: 80px;
        }

        .section1 {
            background-color: lightgreen;
            height: 100px;
            text-align: center;
            line-height: 100px;
        }

        .middle {
            display: flex;
        }

        .section2 {
            background-color: wheat;
            width: 70%;
            height: 120px;
            text-align: center;
            line-height: 120px;
        }

        .aside {
            background-color: lightblue;
            width: 30%;
            height: 120px;
            text-align: center;
            line-height: 120px;
        }

        .section3 {
            background-color: cyan;
            height: 80px;
            text-align: center;
            line-height: 80px;
        }

        .footer {
            background-color: lightgray;
            height: 60px;
            text-align: center;
            line-height: 60px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">Header</div>
        <div class="section1">Section 1</div>
        <div class="middle">
            <div class="section2">Section 2</div>
            <div class="aside">Aside</div>
        </div>
        <div class="section3">Section 3</div>
        <div class="footer">Footer</div>
    </div>
</body>

</html>
